// ─── Style tokens ─────────────────────────────────────────────────────────────
const C = {
  bg:"#0A0A0A", surface:"#141414", surface2:"#1E1E1E", surface3:"#282828",
  border:"#2A2A2A", primary:"#FF6B00", primaryH:"#FF8533",

  success:"#22C55E", warn:"#F59E0B", danger:"#EF4444",
};

// ─── Utils ────────────────────────────────────────────────────────────────────
const toCRC = (v, cur, rate) => cur === "USD" ? v * rate : v;

function recCost(rec, ings, rate) {
  const total = (rec.items||[]).reduce((s,it) => {
    const ing = ings.find(i => i.id === it.ingId);
    return s + (ing ? toCRC(Number(ing.cost)||0, ing.cur, rate) * (Number(it.qty)||0) : 0);
  }, 0);
  return { total, per: total / Math.max(Number(rec.portions)||1, 1) };
}

function combCost(combo, recs, ings, rate) {
  const total = (combo.items||[]).reduce((s,it) => {
    const rec = recs.find(r => r.id === it.recId);
    return rec ? s + recCost(rec, ings, rate).per * (Number(it.qty)||1) : s;
  }, 0);
  return { total };
}

function analyze(costCRC, saleCRC, target) {
  if (!saleCRC || saleCRC <= 0 || !costCRC || costCRC <= 0) return null;
  const pct = (costCRC / saleCRC) * 100;
  const margin = ((saleCRC - costCRC) / saleCRC) * 100;
  const status = pct <= target ? "good" : pct <= target * 1.2 ? "warn" : "bad";
  const sugg = costCRC / (target/100);
  return { pct, margin, status, sugg };
}

const fmtCRC = n => "₡" + Math.round(n).toLocaleString("es-CR");
const fmtUSD = n => "$" + (Number(n)||0).toFixed(2);

// ─── Shared UI ────────────────────────────────────────────────────────────────
function Fl({ label, children }) {
  return (
    <div>
      {label && <p style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:.8,marginBottom:5,textTransform:"uppercase"}}>{label}</p>}

}

function SectionHeader({ title, count, noun, action, onAction, formOpen }) {

        <p style={{color:C.muted,fontSize:13,marginTop:2}}>{count} {noun}{count!==1?"s":""}</p>
      </div>
      {!formOpen && <button className="btn-p" onClick={onAction}>{action}</button>}
    </div>
  );
}

function FormCard({ title, children }) {
  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:22,marginBottom:20}}>

      {children}
    </div>
  );
}

function DataTable({ cols, children }) {

            ))}
          </tr>
        </thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}

function TD({ children, muted, mono, right, wrap }) {
  return (
    <td style={{padding:"13px 15px",verticalAlign:"middle",color:muted?C.muted:C.text,fontFamily:mono?"'Courier New',monospace":undefined,textAlign:right?"right":"left",whiteSpace:wrap?"normal":"nowrap"}}>
      {children}
    </td>
  );
}

function Empty({ icon, text }) {
  return (
    <div style={{textAlign:"center",padding:"64px 0",color:C.muted}}>
      <div style={{fontSize:50,marginBottom:12}}>{icon}</div>
      <p style={{fontSize:15}}>{text}</p>
    </div>
  );
}

function KPI({ label, value, color }) {
  return (
    <div>
      <p style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:.8,marginBottom:3,textTransform:"uppercase"}}>{label}</p>
      <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:color||C.text,lineHeight:1}}>{value}</p>
    </div>
  );
}

function CostBadge({ pct, status }) {
  if (pct==null) return <span className="bk-none">—</span>;
  const cls = {good:"bk-good",warn:"bk-warn",bad:"bk-bad"}[status]||"bk-none";
  return <span className={cls}>{pct.toFixed(1)}%</span>;
}

function ErrMsg({ msg }) {
  return msg ? <p style={{color:C.danger,fontSize:13,marginBottom:12}}>⚠ {msg}</p> : null;
}

function LiveKPIs({ costCRC, rate, saleCRC, analysis, target }) {
  if (!costCRC || costCRC <= 0) return null;
  return (
    <div style={{background:C.surface2,borderRadius:8,padding:16,marginBottom:18,display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}}>
      <KPI label="Costo (₡)" value={fmtCRC(costCRC)} />
      <KPI label="Costo ($)" value={fmtUSD(costCRC/rate)} />
      {analysis && <>
        <KPI label="% Costo" value={`${analysis.pct.toFixed(1)}%`} color={{good:C.success,warn:C.warn,bad:C.danger}[analysis.status]} />
        <KPI label="Margen" value={`${analysis.margin.toFixed(1)}%`} color={{good:C.success,warn:C.warn,bad:C.danger}[analysis.status]} />
        <KPI label={`Sugerido (${target}%)`} value={fmtCRC(analysis.sugg)} />
      </>}
      {!analysis && saleCRC===0 && <p style={{color:C.muted,fontSize:13,alignSelf:"center"}}>Ingresá el precio de venta para ver el análisis completo</p>}
    </div>
  );
}

// ─── IngredientsTab ───────────────────────────────────────────────────────────
function IngredientsTab({ d, upd, rate }) {
  const blank = {name:"",unit:"kg",cur:"CRC",packCost:"",packUnits:"",cost:""};
  const [form,setForm] = useState(null);
  const [err,setErr] = useState("");

  const open = (ing=null) => { setErr(""); setForm(ing?{...ing}:{...blank}); };
  const close = () => { setForm(null); setErr(""); };

  const calcUnit = (f) => {
    const pc = Number(f.packCost), pu = Number(f.packUnits);
    return (pc > 0 && pu > 0) ? pc/pu : Number(f.cost)||0;
  };

  const handlePack = (field, value) => {
    const next = {...form, [field]: value};
    const pc = Number(field==="packCost" ? value : next.packCost);
    const pu = Number(field==="packUnits" ? value : next.packUnits);
    if (pc > 0 && pu > 0) next.cost = (pc/pu).toFixed(4);
    setForm(next);
  };

  const submit = () => {
    if (!form.name.trim()) return setErr("El nombre es requerido");
    const unitCost = calcUnit(form);
    if (!unitCost || isNaN(unitCost)) return setErr("Ingresá el costo por paquete y unidades, o el costo unitario");
    const item = {...form, packCost:Number(form.packCost)||0, packUnits:Number(form.packUnits)||0, cost:unitCost};
    upd("ingredients", form.id
      ? d.ingredients.map(i=>i.id===form.id?item:i)
      : [...d.ingredients,{...item,id:uid()}]
    );
    close();
  };

  const del = (id) => {
    const used = d.recipes.filter(r=>(r.items||[]).some(it=>it.ingId===id));
    if (used.length>0) return alert(`Usado en recetas: ${used.map(r=>r.name).join(", ")}. Eliminalo de esas recetas primero.`);
    if (window.confirm("¿Eliminar ingrediente?")) upd("ingredients", d.ingredients.filter(i=>i.id!==id));
  };

  const autoCalc = form && Number(form.packCost)>0 && Number(form.packUnits)>0;
  const preview = form ? calcUnit(form) : 0;

  return (
    <div>
      <SectionHeader title="Ingredientes" count={d.ingredients.length} noun="ingrediente" action="+ Agregar" onAction={()=>open()} formOpen={!!form} />

      {form && (
        <FormCard title={form.id?"✏️ Editar ingrediente":"🆕 Nuevo ingrediente"}>
          <div style={{display:"grid",gridTemplateColumns:"3fr 1fr 1fr",gap:14,marginBottom:14}}>
            <Fl label="Nombre">
              <input className="inp" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ej: Carne de res smash" />
            </Fl>
            <Fl label="Unidad">
              <select className="inp" value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}>{UNITS.map(u=><option key={u}>{u}</option>)}</select>
            </Fl>
            <Fl label="Moneda">
              <select className="inp" value={form.cur} onChange={e=>setForm({...form,cur:e.target.value})}>
                <option value="CRC">₡ Colones</option>
                <option value="USD">$ Dólares</option>
              </select>
            </Fl>
          </div>

          <div style={{background:C.surface2,borderRadius:8,padding:14,marginBottom:14}}>
            <p style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:.8,marginBottom:12,textTransform:"uppercase"}}>
              Precio por paquete <span style={{fontWeight:400,textTransform:"none",letterSpacing:0}}>(si comprás en bulto, llena estos dos)</span>
            </p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
              <Fl label={`Costo por paquete (${form.cur==="USD"?"$":"₡"})`}>
                <input className="inp" type="number" min="0" step="0.01"
                  value={form.packCost}
                  onChange={e=>handlePack("packCost",e.target.value)}
                  placeholder="Ej: 12000" />
              </Fl>
              <Fl label={`Unidades por paquete (${form.unit})`}>
                <input className="inp" type="number" min="0" step="0.001"
                  value={form.packUnits}
                  onChange={e=>handlePack("packUnits",e.target.value)}
                  placeholder="Ej: 25" />
              </Fl>
              <Fl label={`Costo por ${form.unit}${autoCalc?" (auto)":""}`}>
                <input className="inp" type="number" min="0" step="0.0001"
                  value={autoCalc ? preview.toFixed(4) : form.cost}
                  onChange={e=>{ if(!autoCalc) setForm({...form,cost:e.target.value}); }}
                  readOnly={autoCalc}
                  style={{
                    background: autoCalc ? C.surface3 : C.surface2,
                    color: autoCalc ? C.primary : C.text,
                    fontWeight: autoCalc ? 700 : 400,
                  }}
                  placeholder="O ingresá directo" />
              </Fl>
            </div>
            {autoCalc && (
              <p style={{fontSize:12,color:C.muted,marginTop:10}}>
                💡 {form.cur==="CRC"?"₡":"$"}{Number(form.packCost).toLocaleString("es-CR")} ÷ {form.packUnits} {form.unit} = <strong style={{color:C.primary}}>{form.cur==="CRC"?"₡":"$"}{preview.toFixed(4)} por {form.unit}</strong>
              </p>
            )}
            {!autoCalc && (
              <p style={{fontSize:12,color:C.faint,marginTop:10}}>
                O ingresá el costo unitario directamente en el campo de la derecha
              </p>
            )}
          </div>

          <ErrMsg msg={err} />
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button className="btn-g" onClick={close}>Cancelar</button>
            <button className="btn-p" onClick={submit}>{form.id?"Guardar":"Agregar"}</button>
          </div>
        </FormCard>
      )}

      {d.ingredients.length===0 ? <Empty icon="🥩" text="Todavía no hay ingredientes. ¡Agregá el primero!" /> : (
        <DataTable cols={["Ingrediente","Unidad","Info de paquete","Costo / unidad ₡","Costo / unidad $",""]}>
          {d.ingredients.map((ing,i)=>{
            const crc = toCRC(Number(ing.cost)||0, ing.cur, rate);
            const hasPack = ing.packCost>0 && ing.packUnits>0;
            return (
              <tr key={ing.id} className="tr-hover" style={{borderBottom:i<d.ingredients.length-1?`1px solid ${C.border}`:"none"}}>
                <td style={{padding:"13px 15px",fontWeight:600,color:C.text,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ing.name}</td>
                <TD muted>{ing.unit}</TD>
                <td style={{padding:"13px 15px",fontSize:13,color:C.muted}}>
                  {hasPack
                    ? <>{ing.cur==="USD"?"$":"₡"}{Number(ing.packCost).toLocaleString("es-CR")} / {ing.packUnits} {ing.unit}</>
                    : <span style={{color:C.faint,fontSize:12}}>\u2014</span>
                  }
                </td>
                <TD mono>{crc>0 ? fmtCRC(crc) : <span style={{color:C.faint}}>sin costo</span>}</TD>
                <TD mono muted>{crc>0 ? fmtUSD(crc/rate) : "\u2014"}</TD>
                <TD right>
                  <button className="btn-g" style={{marginRight:6}} onClick={()=>open(ing)}>✏️</button>
                  <button className="btn-d" onClick={()=>del(ing.id)}>🗑️</button>
                </TD>
              </tr>
            );
          })}
        </DataTable>
      )}
    </div>
  );
}

function RecipesTab({ d, upd, rate, target, iva, servicio }) {
  const blank = {name:"",portions:1,salePrice:"",saleCur:"CRC",items:[]};
  const [form,setForm] = useState(null);
  const [pick,setPick] = useState({ingId:"",qty:""});
  const [err,setErr] = useState("");

  const open = (rec=null) => { setErr(""); setPick({ingId:"",qty:""}); setForm(rec?{...rec,items:[...(rec.items||[])]}:{...blank}); };
  const close = () => { setForm(null); setErr(""); };

  const addLine = () => {
    if (!pick.ingId||!pick.qty||Number(pick.qty)<=0) return setErr("Seleccioná ingrediente y cantidad válida");

            <div style={{background:C.surface2,borderRadius:8,marginBottom:12,overflow:"hidden"}}>
              {form.items.map((it,i)=>{

                const lineCRC = toCRC(Number(ing.cost),ing.cur,rate)*it.qty;

function SmashCosteo() {
  const [tab,setTab] = useState("ingredientes");
  const [d,setD] = useState(INITIAL);
  const [jb,setJb] = useState({key:"$2a$10$MTzGkFsu45b07iGi4Zm0u.5tJDkbU6LGtMAasLZ7pttj5O34xPQvS",bin:"69c6dc30b7ec241ddcae48b2"});
  const [sync,setSync] = useState({status:"idle",msg:""});

  // Credentials pre-configured
  useEffect(()=>{
    // Auto-load on start
    loadCloud({key:"$2a$10$MTzGkFsu45b07iGi4Zm0u.5tJDkbU6LGtMAasLZ7pttj5O34xPQvS",bin:"69c6dc30b7ec241ddcae48b2"});
  },[]);

  const persistJb = (newJb) => {
    setJb(newJb);
    try { localStorage.setItem("smashcosteo_jb", JSON.stringify(newJb)); } catch {}
  };

  const loadCloud = async (credentials=jb) => {
    if (!credentials.key||!credentials.bin) return setSync({status:"error",msg:"Configurá JSONBin en ⚙️ Config primero"});
    setSync({status:"loading",msg:"Cargando..."});
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${credentials.bin}/latest`,{
        headers:{"X-Master-Key":credentials.key}
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setD({...INITIAL,...json.record});
      setSync({status:"ok",msg:"Datos cargados ✓"});
    } catch(e) {
      setSync({status:"error",msg:`Error: ${e.message}`});
    }
  };

  const saveCloud = async (data=d, credentials=jb) => {
    if (!credentials.key||!credentials.bin) return setSync({status:"error",msg:"Configurá JSONBin en ⚙️ Config primero"});
    setSync({status:"saving",msg:"Guardando..."});
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${credentials.bin}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":credentials.key},
        body:JSON.stringify(data)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setSync({status:"ok",msg:"Guardado en la nube ✓"});
    } catch(e) {
      setSync({status:"error",msg:`Error: ${e.message}`});
    }
  };

  // Auto-save whenever data changes (debounced 1.5s)
  useEffect(()=>{
    const jbCreds = {key:"$2a$10$MTzGkFsu45b07iGi4Zm0u.5tJDkbU6LGtMAasLZ7pttj5O34xPQvS",bin:"69c6dc30b7ec241ddcae48b2"};
    const timer = setTimeout(()=>{ saveCloud(d, jbCreds); }, 1500);
    return ()=>clearTimeout(timer);
  },[d]);

  const upd = (key,val) => {
    setD(prev=>({...prev,[key]:val}));
    setSync({status:"saving",msg:"Guardando..."});
  };

  const rate = d.settings?.rate||530;
  const target = d.settings?.target||30;

  const syncColor = {ok:C.success,error:C.danger,loading:C.muted,saving:C.warn,idle:C.muted}[sync.status];

  const TABS = [
    {id:"ingredientes",label:"🥩 Ingredientes"},
    {id:"recetas",label:"🍔 Recetas"},
    {id:"combos",label:"🎁 Combos"},
    {id:"config",label:"⚙️ Config"},
  ];

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body,html{background:${C.bg};min-height:100vh;}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:${C.surface};}
        ::-webkit-scrollbar-thumb{background:${C.faint};border-radius:3px;}
        input:focus,select:focus{outline:none;border-color:${C.primary}!important;box-shadow:0 0 0 2px ${C.primary}22;}
        .tr-hover:hover td,.tr-hover:hover{background:${C.surface2}!important;cursor:default;}
        .btn-p{background:${C.primary};color:#fff;border:none;padding:9px 18px;border-radius:7px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;transition:background .15s;}
        .btn-p:hover{background:${C.primaryH};}
        .btn-p:disabled{opacity:.5;cursor:not-allowed;}
        .btn-g{background:transparent;color:${C.muted};border:1px solid ${C.border};padding:8px 14px;border-radius:7px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;transition:all .15s;}
        .btn-g:hover{color:${C.text};border-color:${C.muted};}
        .btn-d{background:transparent;color:${C.danger};border:none;cursor:pointer;font-size:14px;padding:4px 8px;border-radius:5px;transition:background .15s;}
        .btn-d:hover{background:rgba(239,68,68,.12);}
        .inp{background:${C.surface2};border:1px solid ${C.border};color:${C.text};border-radius:7px;padding:9px 12px;font-family:'Barlow',sans-serif;font-size:14px;width:100%;transition:border-color .15s;}
        .inp::placeholder{color:${C.muted};}
        .bk-good{background:rgba(34,197,94,.12);color:${C.success};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;display:inline-block;}
        .bk-warn{background:rgba(245,158,11,.12);color:${C.warn};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;display:inline-block;}
        .bk-bad{background:rgba(239,68,68,.12);color:${C.danger};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;display:inline-block;}
        .bk-none{background:${C.surface3};color:${C.muted};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;display:inline-block;}
      `}</style>

      <div style={{fontFamily:"'Barlow',sans-serif",background:C.bg,minHeight:"100vh",color:C.text}}>

        {/* Header */}
        <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,position:"sticky",top:0,zIndex:50}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:C.primary,letterSpacing:2}}>SMASH IT</span>
            <span style={{color:C.faint,fontSize:20,lineHeight:1}}>|</span>
            <span style={{color:C.muted,fontSize:13,fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>Costeo</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {sync.msg && (
              <span style={{fontSize:13,color:syncColor,display:"flex",alignItems:"center",gap:5}}>
                {syncIcon} {sync.msg}
              </span>
            )}
            {sync.status==="idle" && (
              <span style={{fontSize:12,color:C.faint,display:"flex",alignItems:"center",gap:4}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:C.warn,display:"inline-block"}}></span> Sin guardar
              </span>
            )}
            <button className="btn-g" onClick={()=>loadCloud()}>🔄 Cargar</button>
            <button className="btn-p" onClick={()=>saveCloud()} disabled={sync.status==="saving"}>☁️ Guardar</button>
          </div>
        </header>

        {/* Tabs */}
        <nav style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 20px",display:"flex",position:"sticky",top:58,zIndex:40}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background:"transparent",border:"none",
              color:tab===t.id?C.primary:C.muted,
              borderBottom:`2px solid ${tab===t.id?C.primary:"transparent"}`,
              padding:"13px 18px",cursor:"pointer",fontSize:14,
              fontFamily:"'Barlow',sans-serif",fontWeight:tab===t.id?600:400,
              marginBottom:-1,transition:"color .15s",whiteSpace:"nowrap",
            }}>{t.label}</button>
          ))}
        </nav>

        {/* Content */}
        <main style={{padding:"28px 24px",maxWidth:1140,margin:"0 auto"}}>
          {tab==="ingredientes" && <IngredientsTab d={d} upd={upd} rate={rate} />}
          {tab==="recetas"      && <RecipesTab     d={d} upd={upd} rate={rate} target={target} iva={iva} servicio={servicio} />}
          {tab==="combos"       && <CombosTab      d={d} upd={upd} rate={rate} target={target} iva={iva} servicio={servicio} />}
          {tab==="config"       && <ConfigTab      d={d} upd={upd} />}
        </main>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SmashCosteo />);
  </script>
</body>
</html>
